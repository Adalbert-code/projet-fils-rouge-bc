# Ressource B : Déploiement de l'application vitrine (2 Réplicas)
# Resource B: Showcase application deployment (2 Replicas)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ic-webapp
  namespace: icgroup
  labels:
    env: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ic-webapp
  template:
    metadata:
      labels:
        app: ic-webapp
        env: prod
    spec:
      containers:
      - name: ic-webapp
        image: ic-webapp:2.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: ODOO_URL
          value: "http://odoo-service.icgroup.svc.cluster.local:8069"
        - name: PGADMIN_URL
          value: "http://pgadmin-service.icgroup.svc.cluster.local:80"
---
# Ressource A : Service pour l'application vitrine (NodePort/LoadBalancer)
# Resource A: Showcase application service (NodePort/LoadBalancer)
apiVersion: v1
kind: Service
metadata:
  name: ic-webapp-service
  namespace: icgroup
  labels:
    env: prod
spec:
  selector:
    app: ic-webapp
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
    nodePort: 30080
  type: NodePort
