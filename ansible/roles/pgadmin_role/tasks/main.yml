---
# Tâches pour installer pgAdmin via Docker Compose
# Tasks to install pgAdmin via Docker Compose

- name: S'assurer que le répertoire de destination existe
  # Ensure the destination directory exists
  file:
    path: "{{ pgadmin_mount_path }}"
    state: directory
    mode: '0755'

- name: Copier le fichier servers.json
  # Copy the servers.json file
  template:
    src: servers.json.j2
    dest: /opt/servers.json

- name: Copier le template docker-compose
  # Copy the docker-compose template
  template:
    src: docker-compose-pgadmin.yml.j2
    dest: "/opt/{{ pgadmin_service_name }}_compose.yml"

- name: Déployer pgAdmin avec Docker Compose
  # Deploy pgAdmin with Docker Compose
  docker_compose:
    project_src: /opt
    files:
      - "{{ pgadmin_service_name }}_compose.yml"
    state: present
